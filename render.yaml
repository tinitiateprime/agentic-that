services:
  - type: web
    name: agentic-that-telegram
    runtime: docker
    rootDir: integrations/telegram
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /app/data
      - key: SERVICE_HOST
        value: 0.0.0.0
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: CORS_ORIGIN
        value: https://deluxe-klepon-926448.netlify.app
      - key: SESSION_ENCRYPTION_KEY
        generateValue: true
      - key: USER_PROVISIONING_KEY
        generateValue: true
