[build]
  command = "npm run build"
  functions = "netlify/functions"

[build.environment]
  DATA_STORE = "netlify-blobs"
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "WA_PROVIDER,META_API_VERSION,WA_FROM,META_PHONE_NUMBER_ID,META_WABA_ID,META_APP_ID,ADMIN_PASSWORD"

[[redirects]]
  from = "/console"
  to = "/console/index.html"
  status = 200

[[redirects]]
  from = "/console/*"
  to = "/console/:splat"
  status = 200
