[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  DATA_STORE = "netlify-blobs"
  NODE_VERSION = "22"

[[redirects]]
  from = "/console"
  to = "/console/index.html"
  status = 200

[[redirects]]
  from = "/console/*"
  to = "/console/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
